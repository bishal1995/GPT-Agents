openapi: 3.1.0
info:
  title: FastAPI
  version: 0.1.0
servers:
  - url: https://claretta-negligent-kellie.ngrok-free.dev
paths:
  /tasks:
    get:
      summary: Get Tasks
      description: Retrieve a list of daily tasks.
      operationId: get_tasks_tasks_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: Response Get Tasks Tasks Get
                type: array
                items:
                  $ref: "#/components/schemas/Task"
components:
  schemas:
    Task:
      title: Task
      type: object
      properties:
        id:
          title: Id
          type: integer
        description:
          title: Description
          type: string
        completed:
          title: Completed
          type: boolean
      required:
        - id
        - description
        - completed